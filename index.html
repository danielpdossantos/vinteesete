<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nossos 3 Meses</title>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body>

  <div class="container">
    <div class="profile">
  <img src="../midia/perfil.jpg" alt="Foto de perfil">
</div>
    <h2>Olá! Seja bem-vindo!</h2>
    <p>Acesse para prosseguir...</p>

    <input type="text" id="user" placeholder="Usuário:">
    <input type="password" id="password" placeholder="Senha:">

    <button onclick="login()">Entrar</button>

    <div class="forgot" onclick="forgotPassword()">Esqueci a senha</div>

    <div class="error" id="errorMsg">Usuário ou senha incorretos!</div>
    <div class="success" id="successMsg">Login realizado com sucesso!</div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
